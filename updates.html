<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Updates — Logos</title>
<meta name="description" content="What's new in the Logos collection, the website and the Brands Logo Figma plugin." />
<link rel="canonical" href="https://rakibulism.github.io/brands-logo/updates.html" />
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<script>
  (function () {
    var t = localStorage.getItem("theme");
    if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) document.documentElement.classList.add("dark");
  })();
</script>
<style>
  :root {
    --background:#fff; --foreground:#0a0a0a; --muted:#f4f4f5; --muted-foreground:#71717a;
    --border:#e4e4e7; --primary:#18181b; --primary-foreground:#fafafa; --card:#fff; --radius:0.7rem;
  }
  :root.dark {
    --background:#0a0a0a; --foreground:#fafafa; --muted:#1f1f22; --muted-foreground:#a1a1aa;
    --border:#27272a; --primary:#fafafa; --primary-foreground:#18181b; --card:#131316;
  }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--background); color:var(--foreground); }
  a { color: inherit; }
  .container { max-width: 46rem; margin: 0 auto; padding: 0 1.25rem; }

  header.site { position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border);
    background: color-mix(in oklch, var(--background) 72%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  header.site .inner { display: flex; height: 4rem; align-items: center; gap: 1rem; }
  .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; text-decoration: none; }
  .brand svg { width: 20px; height: 20px; }
  nav.main { display: none; gap: 0.25rem; margin-left: 0.5rem; }
  nav.main a { padding: 0.35rem 0.7rem; border-radius: 9999px; font-size: 0.9rem; color: var(--muted-foreground); text-decoration: none; }
  nav.main a:hover { background: var(--muted); color: var(--foreground); }
  nav.main a.active { color: var(--foreground); font-weight: 500; }
  @media (min-width: 720px) { nav.main { display: inline-flex; } }
  .actions { display: flex; align-items: center; gap: 0.6rem; margin-left: auto; }
  .btn-figma { display: inline-flex; align-items: center; gap: 0.45rem; height: 2.25rem; padding: 0 0.85rem;
    border-radius: 9999px; border: 1px solid var(--border); background: var(--background); font-size: 0.875rem; font-weight: 500; text-decoration: none; }
  .btn-figma:hover { background: var(--muted); }
  .btn-figma svg { width: 0.95rem; height: 1.05rem; }
  .btn-figma span { display: none; }
  @media (min-width: 520px) { .btn-figma span { display: inline; } }
  .ttoggle { width: 2.25rem; height: 2.25rem; border-radius: 9999px; border: 1px solid var(--border); background: var(--background); cursor: pointer; display: grid; place-items: center; color: var(--foreground); }
  .ttoggle:hover { background: var(--muted); }
  .ttoggle svg { width: 1rem; height: 1rem; }
  :root:not(.dark) .ttoggle .moon, :root.dark .ttoggle .sun { display: none; }

  main { padding: 2.5rem 0 4rem; }
  h1 { font-size: 2rem; letter-spacing: -0.02em; margin: 0 0 0.5rem; }
  .lead { color: var(--muted-foreground); font-size: 1.1rem; margin: 0 0 2.5rem; }

  .timeline { position: relative; }
  .entry { position: relative; padding: 0 0 1.75rem 1.5rem; border-left: 2px solid var(--border); }
  .entry:last-child { border-left-color: transparent; padding-bottom: 0; }
  .entry::before { content: ""; position: absolute; left: -7px; top: 4px; width: 12px; height: 12px; border-radius: 9999px; background: var(--background); border: 2px solid var(--muted-foreground); }
  .entry.new::before { border-color: #22c55e; }
  .entry.improved::before { border-color: #3b82f6; }
  .entry.fixed::before { border-color: #f59e0b; }
  .entry .top { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .tag { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; padding: 0.1rem 0.45rem; border-radius: 9999px; }
  .tag.new { background: color-mix(in oklch, #22c55e 18%, transparent); color: #16a34a; }
  .tag.improved { background: color-mix(in oklch, #3b82f6 18%, transparent); color: #2563eb; }
  .tag.fixed { background: color-mix(in oklch, #f59e0b 18%, transparent); color: #d97706; }
  .entry .ttl { font-size: 1.05rem; font-weight: 600; }
  .entry .date { font-size: 0.8rem; color: var(--muted-foreground); margin-left: auto; }
  .entry .body { color: var(--muted-foreground); margin-top: 0.35rem; }
  .state { color: var(--muted-foreground); padding: 2rem 0; }
  footer.site { border-top: 1px solid var(--border); padding: 2rem 0; color: var(--muted-foreground); font-size: 0.85rem; }
  footer.site a { color: var(--muted-foreground); }
</style>
</head>
<body>
<header class="site">
  <div class="container inner">
    <a class="brand" href="./">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor"/></svg>
      logos
    </a>
    <nav class="main">
      <a href="./">Home</a>
      <a href="docs.html">Docs</a>
      <a href="updates.html" class="active">Updates</a>
    </nav>
    <div class="actions">
      <a class="btn-figma" href="https://www.figma.com/community/plugin/0000000000/brands-logo" target="_blank" rel="noreferrer">
        <svg viewBox="0 0 24 24" fill="none"><path d="M8.5 3h3.5v6H8.5a3 3 0 0 1 0-6Z" fill="#f24e1e"/><path d="M12 3h3.5a3 3 0 0 1 0 6H12V3Z" fill="#ff7262"/><path d="M8.5 9H12v6H8.5a3 3 0 0 1 0-6Z" fill="#a259ff"/><path d="M12 12a3 3 0 1 1 3.5 2.955A3 3 0 0 1 12 12Z" fill="#1abcfe"/><path d="M8.5 15H12v3a3 3 0 1 1-3.5-3Z" fill="#0acf83"/></svg>
        <span>Install in Figma</span>
      </a>
      <button class="ttoggle" id="ttoggle" aria-label="Toggle theme">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <h1>Updates</h1>
    <p class="lead">What's new across the logo collection, the website and the Figma plugin.</p>
    <div class="timeline" id="timeline"><div class="state">Loading updates…</div></div>
  </div>
</main>

<footer class="site">
  <div class="container">
    © <span id="year"></span> · <a href="https://github.com/rakibulism/brands-logo" target="_blank" rel="noreferrer">GitHub</a> · All logos are trademarks of their respective owners.
  </div>
</footer>

<script>
  document.getElementById("ttoggle").onclick = function () {
    var dark = document.documentElement.classList.toggle("dark");
    localStorage.setItem("theme", dark ? "dark" : "light");
  };
  document.getElementById("year").textContent = new Date().getFullYear();

  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function tagClass(t) { return ["new", "improved", "fixed"].indexOf(t) >= 0 ? t : "new"; }

  fetch("assets/updates.json", { cache: "no-cache" })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var entries = data.entries || [];
      var el = document.getElementById("timeline");
      if (!entries.length) { el.innerHTML = '<div class="state">Nothing yet.</div>'; return; }
      el.innerHTML = entries.map(function (e) {
        var t = tagClass(e.tag);
        return '<div class="entry ' + t + '">' +
          '<div class="top"><span class="tag ' + t + '">' + esc(e.tag || "new") + '</span>' +
          '<span class="ttl">' + esc(e.title) + '</span>' +
          '<span class="date">' + esc(e.date || "") + '</span></div>' +
          '<div class="body">' + esc(e.body || "") + '</div></div>';
      }).join("");
      // mark these as seen so the home-page bell dot clears
      if (entries[0].date) localStorage.setItem("logos_updates_seen", entries[0].date);
    })
    .catch(function () { document.getElementById("timeline").innerHTML = '<div class="state">Couldn\'t load updates.</div>'; });
</script>
</body>
</html>
